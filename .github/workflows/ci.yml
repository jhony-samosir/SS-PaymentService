name: Build & Test PaymentService

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore SS-PaymentService.slnx

    - name: Build
      run: dotnet build SS-PaymentService.slnx --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test SS-PaymentService.slnx --configuration Release --no-build --verbosity normal
